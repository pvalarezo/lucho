# Lucho — Development Environment
# PostgreSQL is local, only Redis + MinIO run in Docker

services:
  # ---- Redis (session memory) ----
  redis:
    image: redis:7-alpine
    container_name: lucho-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    restart: unless-stopped

  # ---- MinIO (S3-compatible object storage for photos/documents) ----
  minio:
    image: minio/minio:latest
    container_name: lucho-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Web console (http://localhost:9001)
    volumes:
      - minio-data-dev:/data
    restart: unless-stopped

volumes:
  redis-data-dev:
  minio-data-dev:
