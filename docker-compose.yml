services:
  # ---- Traefik (reverse proxy + SSL) ----
  traefik:
    image: traefik:v3.2
    container_name: lucho-traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # ---- FastAPI application ----
  app:
    build: .
    container_name: lucho-app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lucho.rule=Host(`lucho.localhost`)"
      - "traefik.http.routers.lucho.entrypoints=web"
    restart: unless-stopped

  # ---- PostgreSQL 16 + pgvector ----
  db:
    image: pgvector/pgvector:pg16
    container_name: lucho-db
    environment:
      POSTGRES_USER: lucho
      POSTGRES_PASSWORD: lucho
      POSTGRES_DB: lucho
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: lucho-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ---- MinIO (S3-compatible object storage) ----
  minio:
    image: minio/minio:latest
    container_name: lucho-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:
  minio-data:
